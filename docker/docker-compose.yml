name: brk

# Environment variables (set in a .env file or shell):
#
# Bitcoin (default):
#   CHAIN_DATA_DIR  — path to bitcoin data directory   (default: /path/to/bitcoin)
#   RPC_HOST        — bitcoind RPC host                (default: localhost)
#   RPC_USER        — bitcoind RPC user                (default: bitcoin)
#   RPC_PASSWORD    — bitcoind RPC password            (default: bitcoin)
#
# Litecoin:
#   CHAIN_DATA_DIR  — path to litecoin data directory  (default: /path/to/litecoin)
#   RPC_HOST        — litecoind RPC host               (default: localhost)
#   RPC_USER        — litecoind RPC user               (default: litecoin)
#   RPC_PASSWORD    — litecoind RPC password           (default: litecoin)
#   CHAIN           — "litecoin"                       (default: bitcoin)

services:
  brk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: brk:latest
    container_name: brk
    restart: unless-stopped
    ports:
      - 7070:3110
    volumes:
      - ${CHAIN_DATA_DIR:-/path/to/bitcoin}:/chaindata:ro
      - ${BRK_DATA_VOLUME:-brk-data}:/home/brk/.brk
      # Bind mount alternative (uncomment and set BRK_DATA_DIR in .env):
      # - ${BRK_DATA_DIR:-./brk-data}:/home/brk/.brk
    command:
      - --bitcoindir
      - /chaindata
      - --blocksdir
      - /chaindata/blocks
      - --brkdir
      - /home/brk/.brk
      - --chain
      - "${CHAIN:-bitcoin}"
      - --rpcconnect
      - "${RPC_HOST:-localhost}"
      - --rpcuser
      - "${RPC_USER:-bitcoin}"
      - --rpcpassword
      - "${RPC_PASSWORD:-bitcoin}"
      # Cookie file alternative (uncomment and remove rpcuser/rpcpassword above):
      # - --rpccookiefile
      # - /chaindata/.cookie
    healthcheck:
      test: ["CMD", "pgrep", "-x", "brk"]
      interval: 30s
      retries: 3
      start_period: 10s

volumes:
  brk-data:
    driver: local
